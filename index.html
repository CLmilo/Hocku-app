<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunno</title>
    <!--CSS-->
    <link rel="stylesheet" href="css/style.css">
    <!--JS-->
    <script src="https://kit.fontawesome.com/93db8f8dd8.js" crossorigin="anonymous"></script>
</head>
<body>
    
    <div class="top-menu-bar">
        <div class="brand">
            <span class="brand-logo">H</span>
            <p class="brand-title">Hoku</p>
        </div>
        <div class="menu-bar-items">
            <span><i class="fas fa-search"></i></span>
            <span><i class="fas fa-ellipsis-v"></i></span>
        </div>
    </div>

    <div class="content">
        <div class="categories">
            <h2>Categorias</h2>
            <div class="category-cards">
                <div class="ctg-card">
                    <span><i class="fas fa-hamburger"></i></span>
                    <p>Hamburgesa</p>
                </div>
                <div class="ctg-card">
                    <span><i class="fas fa-pizza-slice"></i></span>
                    <p>Pizza</p>
                </div>
                <div class="ctg-card">
                    <span><i class="fas fa-utensils"></i></span>
                    <p>Menu</p>
                </div>
                <div class="ctg-card">
                    <span><i class="fas fa-ice-cream"></i></span>
                    <p>Helados</p>
                </div>
                <div class="ctg-card">
                    <span><i class="fas fa-bread-slice"></i></span>
                    <p>Desayuno</p>
                </div>
                <div class="ctg-card">
                    <span><i class="fas fa-candy-cane"></i></span>
                    <p>Dulces</p>
                </div>
                <div class="ctg-card">
                    <span><i class="fas fa-apple-alt"></i></span>
                    <p>Frutas</p>
                </div>
            </div>
        </div>
        <div class="catalog">
            <h2>Catalogo</h2>
            <div class="catalog-cards">
                <div class="ctl-card">
                    <img src="assets/img/img1.jpg" alt="example" width="100%">
                    <div class="ctl-card-overlay"></div>
                </div>
                <div class="ctl-card">
                    <img src="assets/img/img2.jpg" alt="example" width="100%">
                    <div class="ctl-card-overlay"></div>
                </div>
                <div class="ctl-card">
                    <img src="assets/img/img3.jpg" alt="example" width="100%">
                    <div class="ctl-card-overlay"></div>
                </div>
                <div class="ctl-card">
                    <img src="assets/img/img2.jpg" alt="example" width="100%">
                    <div class="ctl-card-overlay"></div>
                </div>
                <div class="ctl-card">
                    <img src="assets/img/img1.jpg" alt="example" width="100%">
                    <div class="ctl-card-overlay"></div>
                </div>
                <div class="ctl-card">
                    <img src="assets/img/img3.jpg" alt="example" width="100%">
                    <div class="ctl-card-overlay"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav-bar" id="nav-bar">
        <ul>
            <li class="nav-bar-button nav-bar-active"><span><i class="fas fa-stream"></i></span><span class="nav-dot nav-dot-active"></span></li>
            <li class="nav-bar-button"><span><i class="fas fa-shopping-cart"></i></span><span class="nav-dot"></span></li>
            <li class="nav-bar-button"><span id="nav-bar-add"><i class="fas fa-plus"></i></span><span class="nav-dot"></span></li>
            <li class="nav-bar-button"><span><i class="far fa-heart"></i></span><span class="nav-dot"></span></li>
            <li class="nav-bar-button"><span><i class="far fa-user"></i></span><span class="nav-dot"></span></li>
        </ul>
    </div>

    <script type="text/javascript" src="js/app.js"></script>
</body>
</html>
